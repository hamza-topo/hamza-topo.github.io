version: "2.1"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hamza-portfolio-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
